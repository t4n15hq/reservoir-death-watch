name: fetch-cwc-bulletin

# Why this exists: pulls the CWC daily reservoir feed from data.gov.in's
# Open Government Data API and opens a PR with any new bulletin CSVs.
#
# (Earlier iterations of this workflow chased rsms.cwc.gov.in/admin/...
# bulletin PDFs — that URL returns HTTP 401 unconditionally from every
# network we tested; it was never a stable public path. data.gov.in
# carries the same CWC daily data as a versioned, free, JSON API.)
#
# Requires repo secret DATA_GOV_IN_API_KEY. Register at
# https://www.data.gov.in/ and generate a key from your profile.

on:
  schedule:
    # Every Friday 03:30 UTC ≈ 09:00 IST. data.gov.in updates daily so
    # weekly is a courtesy — we don't need to hammer it.
    - cron: "30 3 * * 5"
  workflow_dispatch:
    inputs:
      days_back:
        description: "How many days of records to pull (default 14)"
        required: false
        default: "14"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cwc-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Fetch from data.gov.in
        id: fetch
        continue-on-error: true
        env:
          PYTHONPATH: src
          DATA_GOV_IN_API_KEY: ${{ secrets.DATA_GOV_IN_API_KEY }}
        run: |
          if [ -z "$DATA_GOV_IN_API_KEY" ]; then
            echo "::error::DATA_GOV_IN_API_KEY repo secret is not set. Register at https://www.data.gov.in/ and add the key under Settings → Secrets and variables → Actions."
            echo "rc=99" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DAYS="${{ github.event.inputs.days_back || '14' }}"
          set +e
          python scripts/fetch_data_gov_in.py --days-back "$DAYS" --verbose
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Stage any new bulletin artifacts
        id: stage
        run: |
          cd ..  # back to repo root for git
          if git diff --quiet pipeline/data/cwc/; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "::notice::no new CWC bulletin CSVs (either API empty for this window or all dates already present)"
          else
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::new CWC artifacts staged"
            git diff --stat pipeline/data/cwc/
          fi

      - name: Open pull request on success
        if: steps.stage.outputs.no_changes == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data(cwc): daily reservoir pull from data.gov.in"
          title: "Weekly CWC pull from data.gov.in"
          body: |
            Automated pull from `api.data.gov.in/resource/1fc2148c-...`
            (CWC's daily reservoir level resource).

            New / updated files in `pipeline/data/cwc/` are staged. After merge:

            ```bash
            cd pipeline
            uv run python scripts/rebuild_storage_from_csv.py
            ```

            …will refresh the dashboard's storage estimates against the new
            calibration anchors.

            ### Field caveat

            The data.gov.in daily resource carries `live_capacity_at_frl_bcm`
            and `live_storage_bcm` but **not** `normal_storage_bcm` or
            `percent_normal` (those are weekly-bulletin-only fields from the
            PDF). Those columns are written as empty; the loader tolerates it.
            If you need long-period-average comparisons, drop a parsed
            weekly bulletin PDF into `pipeline/data/cwc/raw_pdfs/` and run
            `parse_local_cwc_pdfs.py` — that yields a strictly-richer CSV
            that supersedes the data.gov.in one for that date.
          branch: cwc-auto-fetch
          delete-branch: true
          labels: |
            automated
            data

      - name: Summarise run
        run: |
          echo "## CWC fetch run summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.fetch.outputs.rc }}" = "99" ]; then
            echo "❌ \`DATA_GOV_IN_API_KEY\` secret is not configured. Register at https://www.data.gov.in/ and add the key under repo Settings → Secrets and variables → Actions." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.stage.outputs.no_changes }}" = "false" ]; then
            echo "✅ Fetched new bulletin rows — pull request opened." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ No new bulletin CSVs (either no new dates in the window, or existing files were already complete)." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "fetch script exit code: \`${{ steps.fetch.outputs.rc }}\`" >> "$GITHUB_STEP_SUMMARY"
