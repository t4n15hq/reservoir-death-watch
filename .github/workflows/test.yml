name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    name: pipeline · pytest + ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check src tests scripts

      - name: Pytest
        # Backtests are network-bound (require Earth Engine creds + ~5 min per case).
        # They opt-in via RDW_RUN_BACKTESTS=1; CI never sets that env var, so they
        # auto-skip. The skip is visible in the test summary, not silent.
        env:
          PYTHONPATH: src:scripts
        run: python -m pytest -v

  dashboard:
    name: dashboard · vite build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bundle size check
        run: |
          GZIP_BYTES=$(gzip -c dist/assets/index-*.js | wc -c)
          echo "main bundle gzip: $GZIP_BYTES bytes"
          # TDD §9 budget is "dashboard initial load < 3s on 4G". For the main
          # JS bundle that translates to roughly < 500 KB gzipped — refuse to
          # ship if we cross that threshold accidentally.
          if [ "$GZIP_BYTES" -gt 500000 ]; then
            echo "::error::main bundle exceeds 500 KB gzipped"
            exit 1
          fi

  data-artifacts:
    name: data · schema validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pipeline (schemas only)
        working-directory: pipeline
        run: pip install -e .

      - name: Validate reservoirs.json against schema
        run: |
          python -c "
          import json
          from pathlib import Path
          from reservoirs.schemas import DashboardSnapshot
          path = Path('dashboard/public/data/reservoirs.json')
          snap = DashboardSnapshot.model_validate(json.loads(path.read_text()))
          print(f'reservoirs.json: {len(snap.reservoirs)} entries OK')
          "

      - name: Confirm every reservoir in the master CSV has an AOI file
        run: |
          python -c "
          import csv
          from pathlib import Path
          missing = []
          for row in csv.DictReader(open('docs/reservoirs.csv')):
              aoi = Path(row['aoi_file'])
              if not aoi.exists():
                  missing.append(row['id'])
          if missing:
              print(f'Missing AOIs: {missing}')
              raise SystemExit(1)
          print(f'All {len(list(csv.DictReader(open(\"docs/reservoirs.csv\"))))} AOIs present')
          "
